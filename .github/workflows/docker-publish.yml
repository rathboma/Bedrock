name: Publish Bedrock Docker Image

on:
  schedule:
    - cron: '0 7 * * *'  # Daily at 07:00 UTC
  workflow_dispatch:

concurrency:
  group: docker-publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Build newest upstream tag
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve newest upstream tag
        id: tag
        run: |
          # Date-style tags only (YYYY-MM-DD); ignores composite/test tags.
          TAG=$(git ls-remote --tags --refs https://github.com/Expensify/Bedrock.git \
                | awk -F'refs/tags/' '{print $2}' \
                | grep -E '^[0-9]{4}-[0-9]{2}-[0-9]{2}$' \
                | sort -r \
                | head -n 1)
          if [ -z "$TAG" ]; then
            echo "No date-style tags found on Expensify/Bedrock." >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Newest upstream tag: ${TAG}"

      - name: Check Docker Hub for existing image
        id: exists
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if docker manifest inspect "rathboma/bedrock:${TAG}" >/dev/null 2>&1; then
            echo "already_built=true" >> "$GITHUB_OUTPUT"
            echo "rathboma/bedrock:${TAG} already exists on Docker Hub — skipping build."
          else
            echo "already_built=false" >> "$GITHUB_OUTPUT"
            echo "rathboma/bedrock:${TAG} is new — will build."
          fi

      - name: Check out the tag (with submodules)
        if: steps.exists.outputs.already_built == 'false'
        uses: actions/checkout@v4
        with:
          repository: Expensify/Bedrock
          ref: ${{ steps.tag.outputs.tag }}
          submodules: recursive
          fetch-depth: 1

      - name: Copy Dockerfile from this repo
        if: steps.exists.outputs.already_built == 'false'
        uses: actions/checkout@v4
        with:
          path: __fork
          sparse-checkout: |
            Dockerfile
          sparse-checkout-cone-mode: false
          fetch-depth: 1

      - name: Stage Dockerfile at build context root
        if: steps.exists.outputs.already_built == 'false'
        run: cp __fork/Dockerfile ./Dockerfile

      - name: Set up Docker Buildx
        if: steps.exists.outputs.already_built == 'false'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.exists.outputs.already_built == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        if: steps.exists.outputs.already_built == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            rathboma/bedrock:${{ steps.tag.outputs.tag }}
            rathboma/bedrock:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        if: always()
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          SKIPPED: ${{ steps.exists.outputs.already_built }}
        run: |
          {
            echo "## Bedrock Docker publish"
            echo ""
            echo "- **Tag:** \`${TAG}\`"
            if [ "${SKIPPED}" = "true" ]; then
              echo "- **Result:** skipped (already on Docker Hub)"
            else
              echo "- **Result:** built and pushed \`rathboma/bedrock:${TAG}\` + \`:latest\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
